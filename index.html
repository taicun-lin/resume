<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Taicun Lin Resume</title>
  <meta http-equiv="refresh" content="4; url=resume/online/en.html">
  <link rel="canonical" href="resume/online/en.html">
  <style>
    :root{
      --ink:#0b1736;
      --muted:#5f6f8f;
      --brand:#0d3b8e;
      --brand2:#0ea5e9;
      --line:#dce6f4;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 80% 10%, rgba(14,165,233,.20), transparent 32%),
        linear-gradient(180deg,#f7f9fd 0%,#eef4ff 100%);
      font-family:"Inter","Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--ink);
    }
    .card{
      width:min(720px, calc(100% - 32px));
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:28px;
      padding:40px;
      box-shadow:0 24px 70px rgba(18,39,79,.12);
      text-align:center;
    }
    .eyebrow{
      color:var(--brand);
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:.82rem;
      margin-bottom:12px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(2rem,5vw,3.4rem);
      line-height:1.05;
    }
    p{
      margin:10px auto;
      color:var(--muted);
      max-width:560px;
      line-height:1.7;
    }
    .actions{
      margin-top:26px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    a.button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#fff;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      padding:11px 18px;
      border-radius:999px;
      font-weight:800;
    }
    .note{
      font-size:.9rem;
      margin-top:22px;
    }
  </style>
  <script>
    window.setTimeout(function(){
      window.location.href = "resume/online/en.html";
    }, 4000);
  </script>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Redirecting</div>
    <h1>Taicun Lin Resume</h1>
    <p>即將前往英文版履歷頁面。若瀏覽器沒有自動跳轉，請點擊下方按鈕。</p>
    <p>Redirecting to the English resume page in a few seconds.</p>
    <div class="actions">
      <a class="button" href="online/en.html">Open Resume</a>
    </div>
    <p class="note">Destination: taicun-lin.github.io/resume/online/en.html</p>
  </main>
</body>
</html>
